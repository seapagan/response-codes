name: Linting

on: [push, pull_request, workflow_dispatch]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Linting
        uses: astral-sh/ruff-action@v4.0.0
        with:
          args: check
      - name: Check Formatting
        uses: astral-sh/ruff-action@v4.0.0
        with:
          args: format --check
